# Local alerting lab: Prometheus fires real alerts → Alertmanager routes /
# inhibits them → a webhook "sink" shows what actually gets delivered.
# Grafana is included so you can explore the same data the Grafana way.
#
#   docker compose up -d
#   Prometheus   http://localhost:9090/alerts
#   Alertmanager http://localhost:9093
#   Grafana      http://localhost:3000   (anonymous admin)
#   Sink logs    docker compose logs -f sink   ← the notifications actually sent
#
# See README.md for the guided walkthrough.

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle          # allows `curl -XPOST .../-/reload`
    volumes:
      - ./prometheus:/etc/prometheus:ro
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
    ports:
      - "9093:9093"

  # Notification sink: logs every webhook it receives, so you can SEE which
  # receiver actually fired (and which alerts were inhibited/silenced away).
  sink:
    image: mendhak/http-https-echo:31
    environment:
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
