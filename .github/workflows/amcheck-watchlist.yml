name: amcheck watchlist

# Daily scan of the public Alertmanager configs in watchlist.txt. Only configs
# whose latest-commit SHA changed since the last run are diffed with amcheck.
# Updates watchlist-state.tsv and the aggregate-only SCOREBOARD.md, and commits
# them back. Runs on the default branch only (GitHub schedules ignore others).

on:
  schedule:
    - cron: "17 6 * * *" # every day at 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: amcheck-watchlist
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: false

      - name: Build amcheck
        run: go build -o "$RUNNER_TEMP/amcheck" .

      - name: Scan watchlist
        env:
          GH_TOKEN: ${{ github.token }}
          AMCHECK: ${{ runner.temp }}/amcheck
        run: bash scripts/watchlist-scan.sh

      - name: Commit results
        run: |
          git config user.name "amcheck-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add watchlist-state.tsv SCOREBOARD.md
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "watchlist: $(date -u +%F)"
            git push
          fi
